services:
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://ghostmesh:ghostmesh@postgres:5432/ghostmesh
      GHOSTMESH_ENVIRONMENT: development
      GHOSTMESH_RUNTIME_BACKEND: postgres
      LOG_LEVEL: INFO
    command: sh -c "alembic upgrade head && uvicorn ghostmesh.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ghostmesh
      POSTGRES_USER: ghostmesh
      POSTGRES_PASSWORD: ghostmesh
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghostmesh -d ghostmesh"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
