services:
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://ghostmesh:ghostmesh@postgres:5432/ghostmesh
      GHOSTMESH_ENVIRONMENT: development
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ghostmesh
      POSTGRES_USER: ghostmesh
      POSTGRES_PASSWORD: ghostmesh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghostmesh -d ghostmesh"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

