name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ghostmesh
          POSTGRES_USER: ghostmesh
          POSTGRES_PASSWORD: ghostmesh
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ghostmesh -d ghostmesh"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Lint
        run: poetry run ruff check .

      - name: Validate migrations
        env:
          DATABASE_URL: postgresql+psycopg://ghostmesh:ghostmesh@localhost:5432/ghostmesh
        run: poetry run alembic upgrade head

      - name: Validate Docker Compose
        run: docker compose config

      - name: Test
        run: poetry run pytest
