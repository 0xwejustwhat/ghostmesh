id: hello_world
version: "1.0.0"
description: Minimal Source to Worker to Validator to Sink workflow.

buckets:
  - id: intake
    description: Cards created by the source.
  - id: worker_inbox
    description: Cards waiting for worker transformation.
  - id: validation_inbox
    description: Artifacts waiting for validator review.
    acceptance_contract: basic_review
  - id: done
    description: Accepted Cards ready for sink egress.
  - id: rejected
    description: Rejected Cards ready for follow-up.

acceptance_contracts:
  - id: basic_review
    description: Human validator confirms that the artifact is acceptable.
    rules:
      - type: artifact_reference_structure
      - type: required_artifacts
        min_count: 1
        roles:
          - draft
      - type: human_review

nodes:
  - id: intake_source
    type: source
    output_pipes:
      - intake_output
  - id: example_worker
    type: worker
    input_pipes:
      - worker_input
    output_pipes:
      - worker_output
  - id: human_validator
    type: validator
    validator_kind: routing
    input_pipes:
      - validator_input
    output_pipes:
      - publish
      - reject
    acceptance_contract: basic_review
    config:
      accept_exits:
        - publish
  - id: archive_sink
    type: sink
    input_pipes:
      - sink_input
    config:
      egress_contract:
        type: archive
        external_reference_required: false
      egress_idempotency:
        key: card_id + sink_id

pipe_bindings:
  intake_output:
    node: intake_source
    direction: output
    bucket: worker_inbox
  worker_input:
    node: example_worker
    direction: input
    bucket: worker_inbox
  worker_output:
    node: example_worker
    direction: output
    bucket: validation_inbox
  validator_input:
    node: human_validator
    direction: input
    bucket: validation_inbox
  publish:
    node: human_validator
    direction: output
    bucket: done
  reject:
    node: human_validator
    direction: output
    bucket: rejected
  sink_input:
    node: archive_sink
    direction: input
    bucket: done

edges:
  - from: intake_source
    to: example_worker
    on: card_created
  - from: example_worker
    to: human_validator
    on: artifact_submitted
  - from: human_validator
    to: archive_sink
    on: publish
