id: system_workflow_genesis
version: "1.0.0"
description: Generic intent-to-workflow-proposal governance flow.
metadata:
  registry:
    name: Workflow Genesis
    tags:
      - genesis
      - governance
    input_types:
      - structured_intent
    output_types:
      - patch_panel_proposal
    required_tools:
      - patch_panel_validator
      - governance_review
    risk_level: medium

buckets:
  - id: intent_intake
    description: Structured intent admitted through generic genesis APIs.
  - id: topology_proposals
    description: Candidate Patch Panel definitions created by a designer seat.
  - id: governance_review
    description: Validated proposals awaiting reviewer approval.
  - id: published_registry_updates
    description: Approved workflows ready for registry publication.
  - id: rejected_proposals
    description: Proposals kept inspectable after rejection.

nodes:
  - id: intent_source
    type: source
    output_pipes:
      - intent_output
  - id: generative_designer_seat
    type: worker
    input_pipes:
      - intent_input
    output_pipes:
      - proposal_output
    config:
      mode: workflow_design
  - id: patch_panel_validator
    type: validator
    validator_kind: objective
    input_pipes:
      - proposal_validation_input
    output_pipes:
      - proposal_validated
  - id: governance_reviewer
    type: validator
    validator_kind: routing
    input_pipes:
      - governance_review_input
    output_pipes:
      - proposal_approved
      - proposal_rejected
    config:
      accept_exits:
        - proposal_approved
  - id: registry_publication_sink
    type: sink
    input_pipes:
      - publication_input
    config:
      egress_contract:
        type: registry_publication
        external_reference_required: false

pipe_bindings:
  intent_output:
    node: intent_source
    direction: output
    bucket: intent_intake
  intent_input:
    node: generative_designer_seat
    direction: input
    bucket: intent_intake
  proposal_output:
    node: generative_designer_seat
    direction: output
    bucket: topology_proposals
  proposal_validation_input:
    node: patch_panel_validator
    direction: input
    bucket: topology_proposals
  proposal_validated:
    node: patch_panel_validator
    direction: output
    bucket: governance_review
  governance_review_input:
    node: governance_reviewer
    direction: input
    bucket: governance_review
  proposal_approved:
    node: governance_reviewer
    direction: output
    bucket: published_registry_updates
  proposal_rejected:
    node: governance_reviewer
    direction: output
    bucket: rejected_proposals
  publication_input:
    node: registry_publication_sink
    direction: input
    bucket: published_registry_updates

edges:
  - from: intent_source
    to: generative_designer_seat
    on: card_created
  - from: generative_designer_seat
    to: patch_panel_validator
    on: artifact_submitted
  - from: patch_panel_validator
    to: governance_reviewer
    on: proposal_validated
  - from: governance_reviewer
    to: registry_publication_sink
    on: proposal_approved
